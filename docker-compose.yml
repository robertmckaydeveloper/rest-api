name: restapi-project

volumes:
  postgres-data:
  git-home:

services:

  frontend:
    container_name: reactdev
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app # Mounts your react folder
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with hot-reload in Docker
    command: sh -c "npm install && npm start"
    networks:
      - app-network


  backend:
    container_name: javadev
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # NOTE: POSTGRES_DB/USER/PASSWORD should match values in db container
        POSTGRES_PASSWORD: postgres
        POSTGRES_USER: postgres
        POSTGRES_DB: postgres
        POSTGRES_HOSTNAME: db

    volumes:
      - .:/workspaces/restapi:cached
      - git-home:/home/vscode
      
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Use proper Docker networking instead of network_mode: service:db
    # to ensure reliable DNS resolution in all environments
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally. 
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    container_name: postgresdb
    image: postgres:latest
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      # NOTE: POSTGRES_DB/USER/PASSWORD should match values in app container
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  keycloak:
    container_name: keycloakdev
    image: quay.io/keycloak/keycloak:latest
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/dev-realm-realm.json:/opt/keycloak/data/import/dev-realm-realm.json:ro
    environment:
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    networks:
      - app-network
    ports:
      - "8081:8080"

networks:
  app-network:
    driver: bridge