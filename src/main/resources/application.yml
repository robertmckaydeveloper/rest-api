spring:
  application:
    name: restapi

  datasource:
    url: jdbc:postgresql://db:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update

management:
  info:
    app:
      name: ${spring.application.name}
      version: 1.0.0
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

  endpoint:
    shutdown:
      enabled: true
      
  endpoints:
    web:
      exposure:
        include: "health,info,shutdown"